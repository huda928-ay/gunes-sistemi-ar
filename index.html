<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Güneş Sistemi AR - Gezegen Bilgi Kartları</title>

    <!-- MindAR ve A-Frame Kütüphaneleri (Resmi Sürümler) -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* ===== GENEL STILLER ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* A-Frame sahnesi için z-index ayarı */
        a-scene {
            z-index: 1 !important;
        }

        a-scene canvas {
            z-index: 1 !important;
        }

        /* ===== YÜKLENİYOR EKRANI ===== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-planet {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b35, #f7c59f);
            animation: pulse 1.5s ease-in-out infinite, rotate 3s linear infinite;
            box-shadow: 0 0 60px rgba(255, 107, 53, 0.5);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #fff;
            margin-top: 30px;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .loading-hint {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            padding: 0 20px;
        }

        /* ===== KONTROL BUTONLARI ===== */
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        .control-btn.muted {
            background: rgba(255, 82, 82, 0.3);
        }

        .control-btn.active {
            background: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
        }

        .control-btn.locked {
            background: rgba(255, 193, 7, 0.4);
        }

        /* ===== GESTURE INDICATOR ===== */
        #gesture-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 1001;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.2s ease;
            pointer-events: none;
        }

        #gesture-indicator.visible {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* ===== SCALE INDICATOR ===== */
        #scale-indicator {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1001;
            display: none;
            pointer-events: none;
        }

        #scale-indicator.visible {
            display: block;
        }

        /* ===== BİLGİ PANELİ (HUD) ===== */
        #info-panel {
            position: fixed;
            bottom: -280px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 380px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            padding: 16px;
            z-index: 1000;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
            max-height: 280px;
            overflow-y: auto;
        }

        #info-panel.visible {
            bottom: 0;
        }

        #info-panel.minimized {
            bottom: -240px !important;
        }

        .panel-handle {
            width: 50px;
            height: 5px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 3px;
            margin: 0 auto 12px auto;
            cursor: pointer;
            transition: background 0.2s;
        }

        .panel-handle:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .panel-handle::after {
            content: '';
            display: block;
            width: 30px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            margin: 4px auto 0 auto;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .planet-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .planet-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .planet-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }

        .planet-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid;
        }

        /* ===== KARŞILAŞTIRMA PANELİ ===== */
        #comparison-panel {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 0 0 16px 16px;
            padding: 12px;
            z-index: 1000;
            transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #comparison-panel.visible {
            top: 0;
        }

        #comparison-panel.collapsed {
            top: -350px;
        }

        #comparison-panel.collapsed #comparison-toggle {
            top: 350px;
        }

        #comparison-toggle {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 30px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: none;
            border-radius: 0 0 12px 12px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.3s ease;
        }

        #comparison-toggle:hover {
            background: rgba(30, 40, 60, 0.95);
        }

        #comparison-content {
            transition: opacity 0.3s ease;
        }

        #comparison-panel.collapsed #comparison-content {
            opacity: 0;
        }

        .comparison-title {
            text-align: center;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: start;
        }

        .compare-planet {
            text-align: center;
        }

        .compare-planet-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .compare-stat {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin: 8px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .compare-stat strong {
            display: block;
            color: #fff;
            font-size: 14px;
            margin-top: 4px;
        }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            font-weight: 700;
        }

        .reset-btn {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* ===== KULLANIM İPUCU ===== */
        #hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeInUp 0.5s ease;
        }

        #hint.hidden {
            display: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ===== GEZEGENLERİN RENKLERİ ===== */
        .color-sun {
            background: linear-gradient(135deg, #ff6b35, #f7c59f);
            border-color: #ff6b35;
        }

        .color-mercury {
            background: linear-gradient(135deg, #8e8e8e, #b8b8b8);
            border-color: #8e8e8e;
        }

        .color-venus {
            background: linear-gradient(135deg, #e8c07d, #f5deb3);
            border-color: #e8c07d;
        }

        .color-earth {
            background: linear-gradient(135deg, #4a90d9, #2ecc71);
            border-color: #4a90d9;
        }

        .color-mars {
            background: linear-gradient(135deg, #cf6a4c, #e07850);
            border-color: #cf6a4c;
        }

        .color-jupiter {
            background: linear-gradient(135deg, #d4a574, #c9a86c);
            border-color: #d4a574;
        }

        .color-saturn {
            background: linear-gradient(135deg, #f4d58d, #e8c872);
            border-color: #f4d58d;
        }

        .color-uranus {
            background: linear-gradient(135deg, #7fdbda, #a8e6cf);
            border-color: #7fdbda;
        }

        .color-neptune {
            background: linear-gradient(135deg, #5b7be9, #7b68ee);
            border-color: #5b7be9;
        }

        .color-moon {
            background: linear-gradient(135deg, #c0c0c0, #e0e0e0);
            border-color: #c0c0c0;
        }
    </style>
</head>

<body>
    <!-- Yükleniyor Ekranı -->
    <div id="loading-screen">
        <div class="loading-planet"></div>
        <div class="loading-text">AR Başlatılıyor...</div>
        <div class="loading-hint">Lütfen kamera erişimine izin verin</div>
    </div>

    <!-- Kontrol Butonları -->
    <div id="controls">
        <button class="control-btn" id="sound-btn" title="Ses Aç/Kapat">🔊</button>
        <button class="control-btn" id="rotation-btn" title="Otomatik Dönüşü Aç/Kapat">🔄</button>
        <button class="control-btn" id="reset-btn" title="Boyutu Sıfırla">↺</button>
        <a href="eclipse.html" class="control-btn" id="eclipse-btn" title="Tutulma Simülasyonu"
            style="text-decoration:none;font-size:22px;">🌘</a>
    </div>

    <!-- Gesture Indicator -->
    <div id="gesture-indicator">
        <span id="gesture-icon">👆</span>
        <span id="gesture-text">Hareket</span>
    </div>

    <!-- Scale Indicator -->
    <div id="scale-indicator">1.0x</div>

    <!-- Kullanım İpucu -->
    <div id="hint">
        📷 Gezegen kartını kameraya tutun
    </div>

    <!-- Bilgi Paneli -->
    <div id="info-panel">
        <div class="panel-handle" id="panel-handle" title="Küçült/Büyüt"></div>
        <div class="panel-header">
            <div class="planet-icon" id="panel-icon">🌍</div>
            <div>
                <div class="planet-name" id="panel-name">Gezegen</div>
                <div class="planet-subtitle" id="panel-subtitle">Güneş Sistemi</div>
            </div>
        </div>
        <div class="info-grid" id="info-grid"></div>
        <div class="planet-description" id="panel-description"></div>
    </div>

    <!-- Karşılaştırma Paneli -->
    <div id="comparison-panel">
        <button id="comparison-toggle" title="Gizle/Göster">▲</button>
        <div id="comparison-content">
            <div class="comparison-title">
                ⚖️ Gezegen Karşılaştırması
            </div>
            <div class="comparison-grid">
                <div class="compare-planet" id="compare-1"></div>
                <div class="vs-divider">VS</div>
                <div class="compare-planet" id="compare-2"></div>
            </div>
            <button class="reset-btn" id="reset-comparison">🔄 Karşılaştırmayı Sıfırla</button>
        </div>
    </div>

    <!-- A-Frame AR Sahnesi -->
    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <!-- Gezegen Dokuları (Solar System Scope - Yerel Dosyalar) -->
        <a-assets timeout="30000">
            <img id="moon-texture" src="assets/textures/ay.jpg" crossorigin="anonymous">
            <img id="earth-texture" src="assets/textures/dunya.jpg" crossorigin="anonymous">
            <img id="sun-texture" src="assets/textures/gunes.jpg" crossorigin="anonymous">
            <img id="jupiter-texture" src="assets/textures/2k_jupiter.jpg" crossorigin="anonymous">
            <img id="mars-texture" src="assets/textures/2k_mars.jpg" crossorigin="anonymous">
            <img id="mercury-texture" src="assets/textures/2k_mercury.jpg" crossorigin="anonymous">
            <img id="neptune-texture" src="assets/textures/neptune.jpg" crossorigin="anonymous">
            <img id="saturn-texture" src="assets/textures/2k_saturn.jpg" crossorigin="anonymous">
            <img id="saturn-ring-texture" src="assets/textures/2k_saturn_ring_alpha.png" crossorigin="anonymous">
            <img id="uranus-texture" src="assets/textures/2k_uranus.jpg" crossorigin="anonymous">
            <img id="venus-texture" src="assets/textures/2k_venus_surface.jpg" crossorigin="anonymous">
        </a-assets>

        <!-- Kamera -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Işıklandırma -->
        <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.2" position="1 1 1"></a-light>


        <!-- HEDEF 0: AY - Gerçekçi Ay dokusu -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"
                animation__float="property: position; to: 0 0.4 0.1; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true">
                <a-sphere radius="0.18" src="#moon-texture" material="side: double"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- HEDEF 1: DÜNYA - Gerçekçi Dünya dokusu -->
        <a-entity mindar-image-target="targetIndex: 1">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"
                animation__float="property: position; to: 0 0.4 0.1; dir: alternate; dur: 2500; easing: easeInOutSine; loop: true">
                <a-sphere radius="0.18" src="#earth-texture" material="side: double"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- HEDEF 2: GÜNEŞ - Gerçekçi Güneş dokusu + Parlaklık -->
        <a-entity mindar-image-target="targetIndex: 2">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear"
                animation__pulse="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dir: alternate; dur: 1000; easing: easeInOutSine; loop: true">
                <!-- Güneş -->
                <a-sphere radius="0.22" src="#sun-texture"
                    material="side: double; emissive: #ff6600; emissiveIntensity: 0.5">
                </a-sphere>
                <!-- Korona -->
                <a-sphere radius="0.25" color="#ffaa00"
                    material="emissive: #ff6600; emissiveIntensity: 0.3; opacity: 0.2; transparent: true"
                    animation="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dir: alternate; dur: 500; loop: true">
                </a-sphere>
            </a-entity>
        </a-entity>

        <!-- HEDEF 3: JÜPİTER - Gerçekçi Jüpiter dokusu -->
        <a-entity mindar-image-target="targetIndex: 3">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
                animation__float="property: position; to: 0 0.38 0.1; dir: alternate; dur: 3000; easing: easeInOutSine; loop: true">
                <a-sphere radius="0.24" src="#jupiter-texture" material="side: double"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- HEDEF 4: MARS - Gerçekçi Mars dokusu -->
        <a-entity mindar-image-target="targetIndex: 4">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear"
                animation__float="property: position; to: 0 0.4 0.1; dir: alternate; dur: 2200; easing: easeInOutSine; loop: true">
                <a-sphere radius="0.16" src="#mars-texture" material="side: double"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- HEDEF 5: MERKÜR - Gerçekçi Merkür dokusu -->
        <a-entity mindar-image-target="targetIndex: 5">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 50000; easing: linear"
                animation__float="property: position; to: 0 0.38 0.1; dir: alternate; dur: 2800; easing: easeInOutSine; loop: true">
                <a-sphere radius="0.12" src="#mercury-texture" material="side: double"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- HEDEF 6: NEPTÜN - Gerçekçi Neptün dokusu -->
        <a-entity mindar-image-target="targetIndex: 6">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
                animation__float="property: position; to: 0 0.4 0.1; dir: alternate; dur: 2600; easing: easeInOutSine; loop: true">
                <a-sphere radius="0.18" src="#neptune-texture" material="side: double"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- HEDEF 7: SATÜRN - Gerçekçi Satürn dokusu + Halka Texture -->
        <a-entity mindar-image-target="targetIndex: 7">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
                animation__float="property: position; to: 0 0.4 0.1; dir: alternate; dur: 3200; easing: easeInOutSine; loop: true">
                <!-- Satürn -->
                <a-sphere radius="0.18" src="#saturn-texture" material="side: double"></a-sphere>
                <!-- Halka - Texture ile -->
                <a-ring position="0 0 0" rotation="70 0 0" radius-inner="0.22" radius-outer="0.38"
                    src="#saturn-ring-texture" material="transparent: true; opacity: 0.9; side: double">
                </a-ring>
            </a-entity>
        </a-entity>

        <!-- HEDEF 8: URANÜS - Gerçekçi Uranüs dokusu + İnce halka -->
        <a-entity mindar-image-target="targetIndex: 8">
            <a-entity position="0 0.35 0.1"
                animation="property: rotation; to: 90 360 0; loop: true; dur: 14000; easing: linear"
                animation__float="property: position; to: 0 0.4 0.1; dir: alternate; dur: 2400; easing: easeInOutSine; loop: true">
                <a-sphere radius="0.17" src="#uranus-texture" material="side: double"></a-sphere>
                <!-- İnce halka -->
                <a-torus position="0 0 0" rotation="90 0 0" radius="0.24" radius-tubular="0.006" color="#a8e6cf"
                    material="opacity: 0.5; transparent: true; side: double">
                </a-torus>
            </a-entity>
        </a-entity>

        // ===== AR BAŞLATILDIĞINDA =====
        document.addEventListener('DOMContentLoaded', () => {
            const sceneEl = document.querySelector('a-scene');

            sceneEl.addEventListener('arReady', () => {
                clearTimeout(arLoadTimeout);
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 500);
            });

            sceneEl.addEventListener('arError', () => {
                clearTimeout(arLoadTimeout);
                loadingScreen.querySelector('.loading-text').textContent = '⚠️ Kamera Erişimi Gerekli';
                loadingScreen.querySelector('.loading-hint').innerHTML =
                    '1. Adres çubuğundaki 🔒 simgesine tıkla<br>' +
                    '2. Kamera → <strong>İzin Ver</strong> seç<br>' +
                    '3. Sayfayı yenile (F5)<br><br>' +

            });

            // 20 saniye içinde AR başlamazsa kullanıcıya yardım mesajı göster
            const arLoadTimeout = setTimeout(() => {
                if (!loadingScreen.classList.contains('hidden')) {
                    loadingScreen.querySelector('.loading-text').textContent = '⚠️ Kamera Erişimi Gerekli';
                    loadingScreen.querySelector('.loading-hint').innerHTML =
                        '1. Adres çubuğundaki 🔒 simgesine tıkla<br>' +
                        '2. Kamera → <strong>İzin Ver</strong> seç<br>' +
                        '3. Sayfayı yenile (F5)<br><br>' +
                        '<button onclick="location.reload()" style="' +
                        'padding:10px 24px;background:#667eea;border:none;border-radius:20px;' +
                        'color:#fff;font-size:15px;cursor:pointer;margin-top:8px">🔄 Yeniden Dene</button>';
                }
            }, 20000);

            // Hedef algılama olayları
            // lastTrackedTarget : en son taranmış hedef (kart gidince model ekranda kalır)
            let lastTrackedTarget = null;
            let persistLoopActive = false;  // Sürekli döngüyü kontrol eder

            // Sürekli görünürlük döngüsü: MindAR her frame'de gizleyebilir,
            // biz her frame'de geri açıyoruz
            function startPersistLoop(target) {
                persistLoopActive = true;
                function loop() {
                    if (!persistLoopActive || target !== lastTrackedTarget) return;
                    // Three.js seviyesinde doğrudan görünür yap
                    if (target.object3D) target.object3D.visible = true;
                    requestAnimationFrame(loop);
                }
                requestAnimationFrame(loop);
            }

            for (let i = 0; i < 10; i++) {
                const target = document.querySelector(`[mindar-image-target="targetIndex: ${i}"]`);
                if (target) {
                    target.addEventListener('targetFound', (e) => {
                        const planetKey = getPlanetKeyByIndex(i);

                        // Farklı kart → eski modeli temizle ve döngüyü durdur
                        if (lastTrackedTarget && lastTrackedTarget !== target) {
                            persistLoopActive = false;
                            lastTrackedTarget.object3D.visible = false;
                        }
                        lastTrackedTarget = target;
                        persistLoopActive = false; // Yeni kart bulundu, döngü gerekmez

                        onPlanetDetected(planetKey);
                    });

                    target.addEventListener('targetLost', (e) => {
                        // Sadece aktif takip edilen kart kaybolunca dondur
                        if (target === lastTrackedTarget) {
                            startPersistLoop(target); // Her frame'de görünür tut
                            stopSpeech();
                            // Info paneli ve model açık kalır
                        }
                    });
                }
            }

            // Panel handle - küçült/büyüt
            const panelHandle = document.getElementById('panel-handle');
            if (panelHandle) {
                panelHandle.addEventListener('click', () => {
                    infoPanel.classList.toggle('minimized');
                });
            }

            // Comparison panel toggle - gizle/göster
            const comparisonToggle = document.getElementById('comparison-toggle');
            const comparisonPanel = document.getElementById('comparison-panel');
            if (comparisonToggle && comparisonPanel) {
                comparisonToggle.addEventListener('click', () => {
                    const isCollapsed = comparisonPanel.classList.toggle('collapsed');
                    comparisonToggle.textContent = isCollapsed ? '▼' : '▲';
                    comparisonToggle.title = isCollapsed ? 'Karşılaştırmayı Göster' : 'Karşılaştırmayı Gizle';
                });
            }
        });

        // Sıralama: Ay, Dünya, Güneş, Jüpiter, Mars, Merkür, Neptün, Satürn, Uranüs, Venüs
        function getPlanetKeyByIndex(index) {
            const keys = ['moon', 'earth', 'sun', 'jupiter', 'mars', 'mercury', 'neptune', 'saturn', 'uranus', 'venus'];
            return keys[index];
        }

        // ===== GEZEGEN ALGILANDI =====
        function onPlanetDetected(planetKey) {
            const planet = planetData[planetKey];
            if (!planet) return;

            // Önceki gezegeni kaydet (karşılaştırma için)
            if (currentPlanet && currentPlanet !== planetKey) {
                previousPlanet = currentPlanet;
            }

            currentPlanet = planetKey;
            hint.classList.add('hidden');

            // Bilgi panelini güncelle
            updateInfoPanel(planet);
            infoPanel.classList.add('visible');

            // Sesli anlatım
            if (isSoundEnabled) {
                speakText(planet.speech);
            }

            // Karşılaştırma kontrolü
            if (previousPlanet && previousPlanet !== currentPlanet) {
                if (!comparisonHistory.includes(previousPlanet)) {
                    comparisonHistory.push(previousPlanet);
                }
                if (!comparisonHistory.includes(currentPlanet)) {
                    comparisonHistory.push(currentPlanet);
                }

                if (comparisonHistory.length >= 2) {
                    showComparison(comparisonHistory[comparisonHistory.length - 2], comparisonHistory[comparisonHistory.length - 1]);
                }
            }
        }

        // ===== GEZEGEN KAYBOLDU =====
        // (Sadece sistem tarafından - yeni kart tarandığında değil, gerçekten gerekirse çağrılır)
        function onPlanetLost() {
            infoPanel.classList.remove('visible');
            stopSpeech();
            activePlanetEntity = null;

            setTimeout(() => {
                if (!infoPanel.classList.contains('visible')) {
                    hint.classList.remove('hidden');
                }
            }, 2000);
        }

        // ===== BİLGİ PANELİNİ GÜNCELLE =====
        function updateInfoPanel(planet) {
            document.getElementById('panel-icon').textContent = planet.icon;
            document.getElementById('panel-icon').className = `planet-icon ${planet.color}`;
            document.getElementById('panel-name').textContent = planet.name;
            document.getElementById('panel-subtitle').textContent = planet.subtitle;

            // Bilgi grid'i
            const infoGrid = document.getElementById('info-grid');
            infoGrid.innerHTML = '';

            let count = 0;
            for (const [label, value] of Object.entries(planet.info)) {
                if (count >= 4) break; // Sadece ilk 4 bilgiyi göster
                const div = document.createElement('div');
                div.className = 'info-item';
                div.innerHTML = `
                    <div class="info-label">${label}</div>
                    <div class="info-value">${value}</div>
                `;
                infoGrid.appendChild(div);
                count++;
            }

            // Açıklama
            const description = document.getElementById('panel-description');
            description.textContent = planet.description;
            description.className = `planet-description ${planet.color}`;
        }

        // ===== KARŞILAŞTIRMA GÖSTER =====
        function showComparison(planet1Key, planet2Key) {
            const planet1 = planetData[planet1Key];
            const planet2 = planetData[planet2Key];

            const compare1 = document.getElementById('compare-1');
            const compare2 = document.getElementById('compare-2');

            compare1.innerHTML = `
                <div class="compare-planet-name">${planet1.icon} ${planet1.name}</div>
                <div class="compare-stat">Çap<strong>${planet1.info['Çap']}</strong></div>
                <div class="compare-stat">Gün<strong>${planet1.info['Gün'] || planet1.info['Yıl']}</strong></div>
                <div class="compare-stat">Yerçekimi<strong>${planet1.info['Yerçekimi'] || '-'}</strong></div>
            `;

            compare2.innerHTML = `
                <div class="compare-planet-name">${planet2.icon} ${planet2.name}</div>
                <div class="compare-stat">Çap<strong>${planet2.info['Çap']}</strong></div>
                <div class="compare-stat">Gün<strong>${planet2.info['Gün'] || planet2.info['Yıl']}</strong></div>
                <div class="compare-stat">Yerçekimi<strong>${planet2.info['Yerçekimi'] || '-'}</strong></div>
            `;

            comparisonPanel.classList.add('visible');
        }

        // ===== SESLİ ANLATIM =====
        function speakText(text) {
            stopSpeech();

            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'tr-TR';
            currentUtterance.rate = 0.9;
            currentUtterance.pitch = 1;
            currentUtterance.volume = 1;

            // Türkçe ses bul
            const voices = speechSynthesis.getVoices();
            const turkishVoice = voices.find(voice => voice.lang.includes('tr'));
            if (turkishVoice) {
                currentUtterance.voice = turkishVoice;
            }

            speechSynthesis.speak(currentUtterance);
        }

        function stopSpeech() {
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }
        }

        // ===== SES BUTONU =====
        soundBtn.addEventListener('click', () => {
            isSoundEnabled = !isSoundEnabled;
            soundBtn.textContent = isSoundEnabled ? '🔊' : '🔇';
            soundBtn.classList.toggle('muted', !isSoundEnabled);

            if (!isSoundEnabled) {
                stopSpeech();
            }
        });

        // ===== KARŞILAŞTIRMAYI SIFIRLA =====
        document.getElementById('reset-comparison').addEventListener('click', () => {
            comparisonPanel.classList.remove('visible');
            comparisonHistory = [];
            previousPlanet = null;
        });

        // ===== SES YÜKLENDİĞİNDE =====
        speechSynthesis.addEventListener('voiceschanged', () => {
            // Sesler yüklendi
        });

        // ===== GESTURE HANDLER FUNCTIONS =====
        const gestureIndicator = document.getElementById('gesture-indicator');
        const gestureIcon = document.getElementById('gesture-icon');
        const gestureText = document.getElementById('gesture-text');
        const scaleIndicator = document.getElementById('scale-indicator');
        const rotationBtn = document.getElementById('rotation-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Touch distance calculator
        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Touch angle calculator
        function getTouchAngle(touches) {
            const dx = touches[1].clientX - touches[0].clientX;
            const dy = touches[1].clientY - touches[0].clientY;
            return Math.atan2(dy, dx) * (180 / Math.PI);
        }

        // Show gesture indicator
        function showGestureIndicator(icon, text) {
            gestureIcon.textContent = icon;
            gestureText.textContent = text;
            gestureIndicator.classList.add('visible');
        }

        // Hide gesture indicator
        function hideGestureIndicator() {
            gestureIndicator.classList.remove('visible');
        }

        // Update scale indicator
        function updateScaleIndicator(scale) {
            scaleIndicator.textContent = scale.toFixed(1) + 'x';
            scaleIndicator.classList.add('visible');
            clearTimeout(scaleIndicator.hideTimeout);
            scaleIndicator.hideTimeout = setTimeout(() => {
                scaleIndicator.classList.remove('visible');
            }, 1500);
        }

        // Apply transform to active planet
        function applyTransform() {
            if (!activePlanetEntity) return;

            const planetModel = activePlanetEntity.querySelector('a-entity');
            if (!planetModel) return;

            console.log('applyTransform - isRightMouseDown:', isRightMouseDown, '| hasAnimation:', planetModel.hasAttribute('animation'));

            // IMPORTANT: Remove float animation that overrides position
            if (planetModel.hasAttribute('animation__float')) {
                planetModel.removeAttribute('animation__float');
            }
            // Remove Sun's pulse animation that blocks zoom
            if (planetModel.hasAttribute('animation__pulse')) {
                planetModel.removeAttribute('animation__pulse');
            }

            // If actively right-dragging, remove auto-rotation and apply manual rotation
            if (isRightMouseDown) {
                if (planetModel.hasAttribute('animation')) {
                    // Store original animation for later restore
                    if (!planetModel.getAttribute('data-original-animation')) {
                        planetModel.setAttribute('data-original-animation', planetModel.getAttribute('animation'));
                    }
                    planetModel.removeAttribute('animation');
                }
                // Apply manual rotation
                planetModel.setAttribute('rotation', `${manualRotationX} ${manualRotationY} 0`);
            }

            // Apply scale
            planetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);

            // Apply position offset
            const baseY = 0.35;
            const baseZ = 0.1;
            planetModel.setAttribute('position',
                `${currentPositionOffset.x} ${baseY + currentPositionOffset.y} ${baseZ}`);
        }

        // Reset transform
        function resetTransform() {
            currentScale = 1.0;
            currentPositionOffset = { x: 0, y: 0 };
            currentRotationOffset = 0;

            if (activePlanetEntity) {
                const planetModel = activePlanetEntity.querySelector('a-entity');
                if (planetModel) {
                    planetModel.setAttribute('scale', '1 1 1');
                    planetModel.setAttribute('position', '0 0.35 0.1');
                    planetModel.setAttribute('rotation', '0 0 0');
                    // Restore auto-rotation
                    console.log('🔄 Reset called - isAutoRotationEnabled:', isAutoRotationEnabled);
                    planetModel.removeAttribute('animation');
                    if (isAutoRotationEnabled) {
                        const defaultAnim = 'property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear';
                        setTimeout(() => {
                            planetModel.setAttribute('animation', defaultAnim);
                            console.log('✅ Animation restored');
                        }, 100);
                    }
                }
            }
            // Reset manual rotation state
            isManualRotating = false;
            manualRotationX = 0;
            manualRotationY = 0;

            showGestureIndicator('↺', 'Sıfırlandı');
            setTimeout(hideGestureIndicator, 1000);
            updateScaleIndicator(1.0);
        }

        // Toggle auto rotation
        function toggleAutoRotation() {
            isAutoRotationEnabled = !isAutoRotationEnabled;
            rotationBtn.classList.toggle('active', !isAutoRotationEnabled);

            // Apply to all planet entities
            for (let i = 0; i < 10; i++) {
                const target = document.querySelector(`[mindar-image-target=\"targetIndex: ${i}\"]`);
                if (target) {
                    // Use first a-entity child (not animation selector)
                    const planetModel = target.querySelector('a-entity');
                    if (planetModel) {
                        planetModel.removeAttribute('animation');
                        if (isAutoRotationEnabled) {
                            // Restore animation with default string
                            const defaultAnim = 'property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear';
                            setTimeout(() => {
                                planetModel.setAttribute('animation', defaultAnim);
                                console.log('✅ Toggle ON - Animation restored');
                            }, 100);
                        } else {
                            console.log('⏸️ Toggle OFF - Animation stopped');
                        }
                    }
                }
            }

            showGestureIndicator(isAutoRotationEnabled ? '🔄' : '⏸️',
                isAutoRotationEnabled ? 'Dönüş Açık' : 'Dönüş Kapalı');
            setTimeout(hideGestureIndicator, 1000);
        }

        // Touch event handlers
        function handleTouchStart(e) {
            if (!activePlanetEntity) return;

            const touches = e.touches;
            touchState.touchCount = touches.length;
            touchState.isGesturing = true;

            if (touches.length === 1) {
                // Single touch - drag
                touchState.startX = touches[0].clientX;
                touchState.startY = touches[0].clientY;
                touchState.lastX = touches[0].clientX;
                touchState.lastY = touches[0].clientY;
            } else if (touches.length === 2) {
                // Two finger touch - pinch zoom + manual rotation
                touchState.initialPinchDistance = getTouchDistance(touches);
                touchState.initialScale = currentScale;
                touchState.initialRotation = getTouchAngle(touches);
                // İki parmak orta noktasını kaydet (döndürme için)
                touchState.lastMidX = (touches[0].clientX + touches[1].clientX) / 2;
                touchState.lastMidY = (touches[0].clientY + touches[1].clientY) / 2;
            }
        }

        function handleTouchMove(e) {
            if (!activePlanetEntity || !touchState.isGesturing) return;
            e.preventDefault();

            const touches = e.touches;

            if (touches.length === 1 && touchState.touchCount === 1) {
                // Drag gesture
                const deltaX = (touches[0].clientX - touchState.lastX) / window.innerWidth;
                const deltaY = (touches[0].clientY - touchState.lastY) / window.innerHeight;

                currentPositionOffset.x += deltaX * 1.5;
                currentPositionOffset.y -= deltaY * 1.5; // Invert Y

                // Apply limits
                currentPositionOffset.x = Math.max(-POSITION_LIMIT_X,
                    Math.min(POSITION_LIMIT_X, currentPositionOffset.x));
                currentPositionOffset.y = Math.max(-POSITION_LIMIT_Y,
                    Math.min(POSITION_LIMIT_Y, currentPositionOffset.y));

                touchState.lastX = touches[0].clientX;
                touchState.lastY = touches[0].clientY;

                showGestureIndicator('👆', 'Taşıma');
                applyTransform();

            } else if (touches.length === 2) {
                // --- ZOOM (pinch) ---
                const currentDistance = getTouchDistance(touches);
                const scaleChange = currentDistance / touchState.initialPinchDistance;
                currentScale = touchState.initialScale * scaleChange;
                currentScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, currentScale));
                updateScaleIndicator(currentScale);

                // --- DÖNDÜRME (iki parmak orta nokta hareketi) ---
                const midX = (touches[0].clientX + touches[1].clientX) / 2;
                const midY = (touches[0].clientY + touches[1].clientY) / 2;
                const rotDeltaX = midX - (touchState.lastMidX || midX);
                const rotDeltaY = midY - (touchState.lastMidY || midY);

                if (Math.abs(rotDeltaX) > 0.5 || Math.abs(rotDeltaY) > 0.5) {
                    isManualRotating = true;
                    isRightMouseDown = true; // applyTransform'a döndürme modunu bildir

                    manualRotationY += rotDeltaX * 0.5;   // yatay kayma → Y ekseni
                    manualRotationX -= rotDeltaY * 0.5;   // dikey kayma → X ekseni
                    manualRotationX = Math.max(-90, Math.min(90, manualRotationX));

                    // Otomatik dönüşü geçici durdur
                    if (activePlanetEntity) {
                        const planetModel = activePlanetEntity.querySelector('a-entity');
                        if (planetModel && planetModel.hasAttribute('animation')) {
                            if (!planetModel.getAttribute('data-original-animation')) {
                                planetModel.setAttribute('data-original-animation', planetModel.getAttribute('animation'));
                            }
                            planetModel.removeAttribute('animation');
                        }
                    }
                }

                touchState.lastMidX = midX;
                touchState.lastMidY = midY;

                showGestureIndicator('🔄', 'Döndürme + Yakınlaştırma');
                applyTransform();
            }
        }

        function handleTouchEnd(e) {
            if (e.touches.length === 0) {
                touchState.isGesturing = false;
                touchState.touchCount = 0;
                setTimeout(hideGestureIndicator, 300);

                // İki parmak döndürmesinden çıkışta otomatik dönüşü geri getir
                if (isManualRotating && isAutoRotationEnabled && activePlanetEntity) {
                    const planetModel = activePlanetEntity.querySelector('a-entity');
                    if (planetModel) {
                        const defaultAnim = 'property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear';
                        planetModel.removeAttribute('animation');
                        setTimeout(() => planetModel.setAttribute('animation', defaultAnim), 100);
                    }
                }
                isRightMouseDown = false;
                isManualRotating = false;

            } else {
                // Parmak sayısı değişti
                touchState.touchCount = e.touches.length;
                if (e.touches.length === 1) {
                    touchState.lastX = e.touches[0].clientX;
                    touchState.lastY = e.touches[0].clientY;
                    // 2 parmaktan 1 parmağa geçişte döndürme modunu sıfırla
                    isRightMouseDown = false;
                    if (isManualRotating && isAutoRotationEnabled && activePlanetEntity) {
                        const planetModel = activePlanetEntity.querySelector('a-entity');
                        if (planetModel) {
                            const defaultAnim = 'property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear';
                            planetModel.removeAttribute('animation');
                            setTimeout(() => planetModel.setAttribute('animation', defaultAnim), 100);
                        }
                    }
                    isManualRotating = false;
                } else if (e.touches.length === 2) {
                    // Yeni 2 parmak konumunu kaydet
                    touchState.lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    touchState.lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                }
            }
        }

        // Add touch event listeners to scene
        document.addEventListener('DOMContentLoaded', () => {
            const sceneCanvas = document.querySelector('a-scene');
            if (sceneCanvas) {
                sceneCanvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                sceneCanvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                sceneCanvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            }
        });

        // Button event listeners
        rotationBtn.addEventListener('click', toggleAutoRotation);
        resetBtn.addEventListener('click', resetTransform);

        // ===== MOUSE EVENT HANDLERS (PC test) =====
        let isMouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;

        document.querySelector('a-scene').addEventListener('loaded', function () {
            const sceneEl = this;

            sceneEl.addEventListener('mousedown', (e) => {
                console.log('🖱️ Mousedown - activePlanetEntity:', activePlanetEntity);
                if (!activePlanetEntity) return;
                if (e.button !== 0) return; // Only left-click

                // Reset manual rotation and restore animation
                if (isManualRotating) {
                    isManualRotating = false;
                    const planetModel = activePlanetEntity.querySelector('a-entity');
                    if (planetModel && isAutoRotationEnabled) {
                        const storedAnim = planetModel.getAttribute('data-original-animation');
                        const animStr = storedAnim || 'property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear';
                        planetModel.removeAttribute('animation');
                        setTimeout(() => planetModel.setAttribute('animation', animStr), 50);
                    }
                }

                isMouseDown = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                console.log('✅ Mouse drag started');
            });

            document.addEventListener('mousemove', (e) => {
                if (!isMouseDown || !activePlanetEntity) return;
                const deltaX = (e.clientX - lastMouseX) / window.innerWidth * 3;
                const deltaY = (e.clientY - lastMouseY) / window.innerHeight * 3;
                currentPositionOffset.x += deltaX;
                currentPositionOffset.y -= deltaY;
                currentPositionOffset.x = Math.max(-POSITION_LIMIT_X, Math.min(POSITION_LIMIT_X, currentPositionOffset.x));
                currentPositionOffset.y = Math.max(-POSITION_LIMIT_Y, Math.min(POSITION_LIMIT_Y, currentPositionOffset.y));
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                console.log('📍 Position offset:', currentPositionOffset.x.toFixed(3), currentPositionOffset.y.toFixed(3));
                showGestureIndicator('👆', 'Taşıma');
                applyTransform();
            });

            document.addEventListener('mouseup', () => {
                isMouseDown = false;
                setTimeout(hideGestureIndicator, 300);
            });

            sceneEl.addEventListener('wheel', (e) => {
                if (!activePlanetEntity) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                currentScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, currentScale + delta));
                showGestureIndicator('🔍', 'Yakınlaştırma');
                updateScaleIndicator(currentScale);
                applyTransform();
            }, { passive: false });

            // ===== RIGHT-CLICK ROTATION (PC) =====
            let lastRightMouseX = 0, lastRightMouseY = 0;

            // Disable context menu on scene
            sceneEl.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });

            sceneEl.addEventListener('mousedown', (e) => {
                if (e.button === 2 && activePlanetEntity) { // Right click
                    isRightMouseDown = true;
                    isManualRotating = true;
                    wasAutoRotating = isAutoRotationEnabled;
                    lastRightMouseX = e.clientX;
                    lastRightMouseY = e.clientY;
                    showGestureIndicator('🔄', 'Manuel Döndürme');
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (!isRightMouseDown || !activePlanetEntity) return;

                const deltaX = (e.clientX - lastRightMouseX) * 0.5;
                const deltaY = (e.clientY - lastRightMouseY) * 0.5;

                manualRotationY += deltaX; // Left-right movement rotates around Y axis
                manualRotationX -= deltaY; // Up-down movement rotates around X axis

                // Clamp X rotation to prevent flipping
                manualRotationX = Math.max(-90, Math.min(90, manualRotationX));

                lastRightMouseX = e.clientX;
                lastRightMouseY = e.clientY;

                applyTransform();
            });

            document.addEventListener('mouseup', (e) => {
                if (e.button === 2) {
                    isRightMouseDown = false;
                    setTimeout(hideGestureIndicator, 300);

                    // Restore animation when right-click drag ends
                    console.log('🔄 Mouseup - activePlanetEntity:', !!activePlanetEntity, 'isAutoRotationEnabled:', isAutoRotationEnabled);
                    if (activePlanetEntity && isAutoRotationEnabled) {
                        const planetModel = activePlanetEntity.querySelector('a-entity');
                        if (planetModel) {
                            // Always use default animation string (storedAnim might be object)
                            const defaultAnim = 'property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear';
                            planetModel.removeAttribute('animation');
                            setTimeout(() => {
                                planetModel.setAttribute('animation', defaultAnim);
                                console.log('✅ Animation restored');
                            }, 100);
                        }
                    }
                }
            });
        });

        // Update activePlanetEntity when planet is detected
        const originalOnPlanetDetected = onPlanetDetected;
        onPlanetDetected = function (planetKey) {
            console.log('🌍 Planet detected:', planetKey);
            // Reset rotation state for new planet
            isManualRotating = false;
            manualRotationX = 0;
            manualRotationY = 0;
            originalOnPlanetDetected(planetKey);
            const index = ['moon', 'earth', 'sun', 'jupiter', 'mars', 'mercury', 'neptune', 'saturn', 'uranus', 'venus'].indexOf(planetKey);
            if (index !== -1) {
                activePlanetEntity = document.querySelector(`[mindar-image-target=\"targetIndex: ${index}\"]`);
                console.log('✅ Active planet entity set:', activePlanetEntity);
            }
        };

        // Reset when planet is lost
        const originalOnPlanetLost = onPlanetLost;
        onPlanetLost = function () {
            originalOnPlanetLost();
            // Optionally reset transform when planet is lost
            // resetTransform();
            activePlanetEntity = null;
        };
    </script>
